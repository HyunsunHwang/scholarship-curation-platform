name: Daily Scholarship Notice Updates

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 08:00 KST every day
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      fresh_start:
        description: "Ignore previous crawler state cache"
        required: false
        default: false
        type: boolean
      ignore_seen:
        description: "Treat all matched items as new (testing)"
        required: false
        default: false
        type: boolean

jobs:
  daily-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore daily crawler state
        if: ${{ github.event.inputs.fresh_start != 'true' }}
        id: crawler-state-restore
        uses: actions/cache/restore@v4
        with:
          path: .crawler
          key: crawler-daily-state-v2-${{ github.run_id }}
          restore-keys: |
            crawler-daily-state-v2-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply unified source tuning
        run: |
          npm run tune:ewha-notices
          npm run tune:korea-notices
          npm run tune:yonsei-notices

      - name: Run Ewha crawler
        env:
          CRAWL_LOOKBACK_DAYS: "1"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "4"
          CRAWL_IGNORE_SEEN: ${{ github.event.inputs.ignore_seen || 'false' }}
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources.csv exports/notices/ewha .crawler/ewha-daily-state.json

      - name: Clean Ewha crawl results
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/ewha/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/ewha/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/ewha/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/ewha/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_ewha_csv"
          fi

      - name: Run Korea crawler
        env:
          CRAWL_LOOKBACK_DAYS: "1"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
          CRAWL_IGNORE_SEEN: ${{ github.event.inputs.ignore_seen || 'false' }}
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources-korea.csv exports/notices/korea .crawler/korea-daily-state.json

      - name: Clean Korea crawl results
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/korea/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/korea/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/korea/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/korea/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_korea_csv"
          fi

      - name: Run Yonsei crawler
        env:
          CRAWL_LOOKBACK_DAYS: "1"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
          CRAWL_IGNORE_SEEN: ${{ github.event.inputs.ignore_seen || 'false' }}
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources-yonsei.csv exports/notices/yonsei .crawler/yonsei-daily-state.json

      - name: Clean Yonsei crawl results
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/yonsei/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/yonsei/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/yonsei/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/yonsei/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_yonsei_csv"
          fi

      - name: Build combined daily CSV
        run: |
          TODAY=$(date +%Y%m%d)
          MERGE_INPUT_PATHS="exports/notices/ewha/scholarship-notices-latest.cleaned.csv,exports/notices/korea/scholarship-notices-latest.cleaned.csv,exports/notices/yonsei/scholarship-notices-latest.cleaned.csv" \
          MERGE_OUTPUT_PATH="exports/notices/daily/scholarship-notices-daily-${TODAY}.csv" \
          npm run merge:notices
          MERGE_INPUT_PATHS="exports/notices/ewha/scholarship-notices-latest.cleaned.csv,exports/notices/korea/scholarship-notices-latest.cleaned.csv,exports/notices/yonsei/scholarship-notices-latest.cleaned.csv" \
          MERGE_OUTPUT_PATH="exports/notices/daily/scholarship-notices-daily-latest.csv" \
          npm run merge:notices

      - name: Send Slack summary
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPORT_JSON_PATHS: exports/notices/ewha/scholarship-notices-latest.json,exports/notices/korea/scholarship-notices-latest.json,exports/notices/yonsei/scholarship-notices-latest.json
          CLEANED_CSV_PATHS: exports/notices/ewha/scholarship-notices-latest.cleaned.csv,exports/notices/korea/scholarship-notices-latest.cleaned.csv,exports/notices/yonsei/scholarship-notices-latest.cleaned.csv
          SOURCE_LABELS: 이화여대,고려대,연세대
          SLACK_PREVIEW_COUNT: "5"
        run: npm run notify:slack

      - name: Save daily crawler state
        if: ${{ always() && github.event.inputs.fresh_start != 'true' && github.event.inputs.ignore_seen != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .crawler
          key: crawler-daily-state-v2-${{ github.run_id }}

      - name: Upload crawl artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scholarship-notice-daily
          path: |
            exports/notices
            .crawler
