name: Crawl Scholarship Notices

on:
  schedule:
    # 08:00 KST every day
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Ewha crawler
        env:
          CRAWL_LOOKBACK_DAYS: "31"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "4"
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources.csv exports/notices/ewha .crawler/ewha-state.json

      - name: Clean Ewha crawl results
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/ewha/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/ewha/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/ewha/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/ewha/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_ewha_csv"
          fi

      - name: Run Korea crawler
        env:
          CRAWL_LOOKBACK_DAYS: "31"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources-korea.csv exports/notices/korea .crawler/korea-state.json

      - name: Clean Korea crawl results
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/korea/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/korea/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/korea/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/korea/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_korea_csv"
          fi

      - name: Send Slack summary
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPORT_JSON_PATHS: exports/notices/ewha/scholarship-notices-latest.json,exports/notices/korea/scholarship-notices-latest.json
          CLEANED_CSV_PATHS: exports/notices/ewha/scholarship-notices-latest.cleaned.csv,exports/notices/korea/scholarship-notices-latest.cleaned.csv
          SOURCE_LABELS: 이화여대,고려대
          SLACK_PREVIEW_COUNT: "5"
        run: npm run notify:slack

      - name: Upload crawl artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scholarship-notice-crawl
          path: |
            exports/notices
            .crawler
