name: Daily Scholarship Notice Updates

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 08:00 KST every day
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      fresh_start:
        description: "Ignore previous crawler state cache"
        required: false
        default: false
        type: boolean
      ignore_seen:
        description: "Treat all matched items as new (testing)"
        required: false
        default: false
        type: boolean

jobs:
  daily-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore daily crawler state
        if: ${{ github.event.inputs.fresh_start != 'true' }}
        id: crawler-state-restore
        uses: actions/cache/restore@v4
        with:
          path: .crawler
          key: crawler-daily-state-v2-${{ github.run_id }}
          restore-keys: |
            crawler-daily-state-v2-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply unified source tuning
        run: |
          npm run tune:cau-notices
          npm run tune:ewha-notices
          npm run tune:hongik-notices
          npm run tune:hanyang-notices
          npm run tune:khu-notices
          npm run tune:korea-notices
          npm run tune:skku-notices
          npm run tune:uos-notices
          npm run tune:yonsei-notices

      - name: Run Ewha crawler
        env:
          CRAWL_LOOKBACK_DAYS: "1"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "3"
          CRAWL_TIMEOUT_MS: "30000"
          CRAWL_RETRY_COUNT: "2"
          CRAWL_RETRY_BACKOFF_MS: "1200"
          CRAWL_SOURCE_ID_PREFIX: "ewha_"
          CRAWL_IGNORE_SEEN: ${{ github.event.inputs.ignore_seen || 'false' }}
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources.csv exports/notices/ewha .crawler/ewha-daily-state.json

      - name: Clean Ewha crawl results
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/ewha/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/ewha/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/ewha/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/ewha/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_ewha_csv"
          fi

      - name: Run CAU crawler
        env:
          CRAWL_LOOKBACK_DAYS: "1"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "3"
          CRAWL_TIMEOUT_MS: "30000"
          CRAWL_RETRY_COUNT: "2"
          CRAWL_RETRY_BACKOFF_MS: "1200"
          CRAWL_SOURCE_ID_PREFIX: "cau_"
          CRAWL_IGNORE_SEEN: ${{ github.event.inputs.ignore_seen || 'false' }}
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources-cau.csv exports/notices/cau .crawler/cau-daily-state.json

      - name: Clean CAU crawl results
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/cau/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/cau/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/cau/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/cau/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_cau_csv"
          fi

      - name: Run Korea crawler
        env:
          CRAWL_LOOKBACK_DAYS: "1"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
          CRAWL_SOURCE_ID_PREFIX: "korea_"
          CRAWL_IGNORE_SEEN: ${{ github.event.inputs.ignore_seen || 'false' }}
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources-korea.csv exports/notices/korea .crawler/korea-daily-state.json

      - name: Clean Korea crawl results
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/korea/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/korea/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/korea/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/korea/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_korea_csv"
          fi

      - name: Run KHU crawler
        env:
          CRAWL_LOOKBACK_DAYS: "1"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
          CRAWL_SOURCE_ID_PREFIX: "khu_"
          CRAWL_IGNORE_SEEN: ${{ github.event.inputs.ignore_seen || 'false' }}
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources-khu.csv exports/notices/khu .crawler/khu-daily-state.json

      - name: Clean KHU crawl results
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/khu/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/khu/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/khu/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/khu/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_khu_csv"
          fi

      - name: Run Hanyang crawler
        env:
          CRAWL_LOOKBACK_DAYS: "1"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
          CRAWL_SOURCE_ID_PREFIX: "hanyang_"
          CRAWL_IGNORE_SEEN: ${{ github.event.inputs.ignore_seen || 'false' }}
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources-hanyang.csv exports/notices/hanyang .crawler/hanyang-daily-state.json

      - name: Clean Hanyang crawl results
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/hanyang/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/hanyang/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/hanyang/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/hanyang/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_hanyang_csv"
          fi

      - name: Run Hongik crawler
        env:
          CRAWL_LOOKBACK_DAYS: "1"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
          CRAWL_SOURCE_ID_PREFIX: "hongik_"
          CRAWL_IGNORE_SEEN: ${{ github.event.inputs.ignore_seen || 'false' }}
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources-hongik.csv exports/notices/hongik .crawler/hongik-daily-state.json

      - name: Clean Hongik crawl results
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/hongik/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/hongik/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/hongik/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/hongik/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_hongik_csv"
          fi

      - name: Run Yonsei crawler
        env:
          CRAWL_LOOKBACK_DAYS: "1"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
          CRAWL_SOURCE_ID_PREFIX: "yonsei_"
          CRAWL_IGNORE_SEEN: ${{ github.event.inputs.ignore_seen || 'false' }}
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources-yonsei.csv exports/notices/yonsei .crawler/yonsei-daily-state.json

      - name: Clean Yonsei crawl results
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/yonsei/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/yonsei/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/yonsei/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/yonsei/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_yonsei_csv"
          fi

      - name: Run SKKU crawler
        env:
          CRAWL_LOOKBACK_DAYS: "1"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
          CRAWL_SOURCE_ID_PREFIX: "skku_"
          CRAWL_IGNORE_SEEN: ${{ github.event.inputs.ignore_seen || 'false' }}
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources-skku.csv exports/notices/skku .crawler/skku-daily-state.json

      - name: Clean SKKU crawl results
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/skku/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/skku/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/skku/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/skku/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_skku_csv"
          fi

      - name: Run UOS crawler
        env:
          CRAWL_LOOKBACK_DAYS: "1"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "3"
          CRAWL_TIMEOUT_MS: "30000"
          CRAWL_RETRY_COUNT: "2"
          CRAWL_RETRY_BACKOFF_MS: "1200"
          CRAWL_SOURCE_ID_PREFIX: "uos_"
          CRAWL_IGNORE_SEEN: ${{ github.event.inputs.ignore_seen || 'false' }}
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources-uos.csv exports/notices/uos .crawler/uos-daily-state.json

      - name: Clean UOS crawl results
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/uos/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/uos/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/uos/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/uos/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_uos_csv"
          fi

      - name: Build combined daily CSV
        run: |
          TODAY=$(date +%Y%m%d)
          MERGE_INPUT_PATHS="exports/notices/cau/scholarship-notices-latest.cleaned.csv,exports/notices/ewha/scholarship-notices-latest.cleaned.csv,exports/notices/hanyang/scholarship-notices-latest.cleaned.csv,exports/notices/hongik/scholarship-notices-latest.cleaned.csv,exports/notices/khu/scholarship-notices-latest.cleaned.csv,exports/notices/korea/scholarship-notices-latest.cleaned.csv,exports/notices/skku/scholarship-notices-latest.cleaned.csv,exports/notices/uos/scholarship-notices-latest.cleaned.csv,exports/notices/yonsei/scholarship-notices-latest.cleaned.csv" \
          MERGE_OUTPUT_PATH="exports/notices/daily/scholarship-notices-daily-${TODAY}.csv" \
          npm run merge:notices
          MERGE_INPUT_PATHS="exports/notices/cau/scholarship-notices-latest.cleaned.csv,exports/notices/ewha/scholarship-notices-latest.cleaned.csv,exports/notices/hanyang/scholarship-notices-latest.cleaned.csv,exports/notices/hongik/scholarship-notices-latest.cleaned.csv,exports/notices/khu/scholarship-notices-latest.cleaned.csv,exports/notices/korea/scholarship-notices-latest.cleaned.csv,exports/notices/skku/scholarship-notices-latest.cleaned.csv,exports/notices/uos/scholarship-notices-latest.cleaned.csv,exports/notices/yonsei/scholarship-notices-latest.cleaned.csv" \
          MERGE_OUTPUT_PATH="exports/notices/daily/scholarship-notices-daily-latest.csv" \
          npm run merge:notices

      - name: Evaluate crawl quality
        env:
          QUALITY_LOOKBACK_DAYS: "7"
          QUALITY_DAILY_DROP_RATIO: "0.5"
          QUALITY_SUCCESS_DROP_ABS: "0.2"
          QUALITY_CORE_GROUPS: "cau,ewha,korea"
        run: npm run evaluate:notices

      - name: Evaluate source health
        env:
          HEALTH_LOOKBACK_DAYS: "7"
          HEALTH_CONSECUTIVE_ERROR_THRESHOLD: "3"
        run: npm run evaluate:source-health

      - name: Warn on quality regressions
        run: |
          node -e "const fs=require('fs');const p='exports/notices/quality/quality-snapshot-latest.json';if(!fs.existsSync(p)){process.exit(0);}const s=JSON.parse(fs.readFileSync(p,'utf8'));const w=s.warnings||[];console.log('quality_warnings='+w.length);for(const item of w){console.log('::warning::'+item);}"
          node -e "const fs=require('fs');const p='exports/notices/quality/source-health-latest.json';if(!fs.existsSync(p)){process.exit(0);}const s=JSON.parse(fs.readFileSync(p,'utf8'));const total=s.totalCandidates||0;console.log('source_health_candidates='+total);for(const group of (s.perGroup||[])){for(const c of (group.candidates||[]).slice(0,5)){console.log('::warning::source unhealthy group='+group.group+' source='+c.sourceId+' streak='+c.consecutiveErrorDays+' error='+c.lastError);}}"

      - name: Ingest notices into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          TODAY=$(date +%Y%m%d)
          npm run ingest:notices -- "exports/notices/daily/scholarship-notices-daily-${TODAY}.csv"

      - name: Summarize review feedback
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FEEDBACK_LOOKBACK_DAYS: "14"
        run: npm run feedback:notices

      - name: Send Slack summary
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPORT_JSON_PATHS: exports/notices/cau/scholarship-notices-latest.json,exports/notices/ewha/scholarship-notices-latest.json,exports/notices/hanyang/scholarship-notices-latest.json,exports/notices/hongik/scholarship-notices-latest.json,exports/notices/khu/scholarship-notices-latest.json,exports/notices/korea/scholarship-notices-latest.json,exports/notices/skku/scholarship-notices-latest.json,exports/notices/uos/scholarship-notices-latest.json,exports/notices/yonsei/scholarship-notices-latest.json
          CLEANED_CSV_PATHS: exports/notices/cau/scholarship-notices-latest.cleaned.csv,exports/notices/ewha/scholarship-notices-latest.cleaned.csv,exports/notices/hanyang/scholarship-notices-latest.cleaned.csv,exports/notices/hongik/scholarship-notices-latest.cleaned.csv,exports/notices/khu/scholarship-notices-latest.cleaned.csv,exports/notices/korea/scholarship-notices-latest.cleaned.csv,exports/notices/skku/scholarship-notices-latest.cleaned.csv,exports/notices/uos/scholarship-notices-latest.cleaned.csv,exports/notices/yonsei/scholarship-notices-latest.cleaned.csv
          SOURCE_LABELS: 중앙대,이화여대,한양대,홍익대,경희대,고려대,성균관대,시립대,연세대
          SLACK_PREVIEW_COUNT: "5"
        run: npm run notify:slack

      - name: Save daily crawler state
        if: ${{ always() && github.event.inputs.fresh_start != 'true' && github.event.inputs.ignore_seen != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .crawler
          key: crawler-daily-state-v2-${{ github.run_id }}

      - name: Upload crawl artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scholarship-notice-daily
          path: |
            exports/notices
            .crawler
