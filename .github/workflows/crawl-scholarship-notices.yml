name: Daily Scholarship Notice Updates

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 08:00 KST every day
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      fresh_start:
        description: "Ignore previous crawler state cache"
        required: false
        default: false
        type: boolean
      ignore_seen:
        description: "Treat all matched items as new (testing)"
        required: false
        default: false
        type: boolean
      matrix_parallel:
        description: "Maximum universities running in parallel (1-9)"
        required: false
        default: "5"
        type: string
      source_concurrency:
        description: "Concurrent sources per university (1-8)"
        required: false
        default: "2"
        type: string
      detail_concurrency:
        description: "Concurrent details per source (1-8)"
        required: false
        default: "1"
        type: string
      host_concurrency:
        description: "Concurrent requests per hostname (1-8)"
        required: false
        default: "2"
        type: string
      telemetry_enabled:
        description: "Collect crawler performance telemetry"
        required: false
        default: true
        type: boolean
      telemetry_sample_interval_ms:
        description: "Telemetry sample interval in milliseconds (1000-30000)"
        required: false
        default: "2000"
        type: string

jobs:
  validate-inputs:
    name: Validate crawl controls
    runs-on: ubuntu-latest
    steps:
      - name: Validate bounded concurrency and telemetry inputs
        env:
          MATRIX_PARALLEL: ${{ inputs.matrix_parallel || '5' }}
          SOURCE_CONCURRENCY: ${{ inputs.source_concurrency || '2' }}
          DETAIL_CONCURRENCY: ${{ inputs.detail_concurrency || '1' }}
          HOST_CONCURRENCY: ${{ inputs.host_concurrency || '2' }}
          SAMPLE_INTERVAL_MS: ${{ inputs.telemetry_sample_interval_ms || '2000' }}
        run: |
          validate_integer() {
            local name="$1" value="$2" minimum="$3" maximum="$4"
            [[ "$value" =~ ^[0-9]+$ ]] && [ "$value" -ge "$minimum" ] && [ "$value" -le "$maximum" ] || {
              echo "::error::${name} must be an integer between ${minimum} and ${maximum}; received '${value}'"
              exit 1
            }
          }
          validate_integer matrix_parallel "$MATRIX_PARALLEL" 1 9
          validate_integer source_concurrency "$SOURCE_CONCURRENCY" 1 8
          validate_integer detail_concurrency "$DETAIL_CONCURRENCY" 1 8
          validate_integer host_concurrency "$HOST_CONCURRENCY" 1 8
          validate_integer telemetry_sample_interval_ms "$SAMPLE_INTERVAL_MS" 1000 30000

  crawl-by-university:
    name: Crawl ${{ matrix.group }}
    needs: validate-inputs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.matrix_parallel || '5') }}
      matrix:
        group: [ewha, cau, korea, khu, hanyang, hongik, yonsei, skku, uos]
    env:
      # Crawl sources are loaded from public.notice_sources (not CSV).
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore university crawler state
        if: ${{ github.event.inputs.fresh_start != 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: .crawler/${{ matrix.group }}-daily-state.json
          key: crawler-daily-state-v3-${{ matrix.group }}-${{ github.run_id }}
          restore-keys: |
            crawler-daily-state-v3-${{ matrix.group }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run university crawler
        env:
          GROUP: ${{ matrix.group }}
          CRAWL_LOOKBACK_DAYS: "1"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: ${{ inputs.source_concurrency || '2' }}
          CRAWL_DETAIL_CONCURRENCY: ${{ inputs.detail_concurrency || '1' }}
          CRAWL_HOST_CONCURRENCY: ${{ inputs.host_concurrency || '2' }}
          CRAWL_MATRIX_MAX_PARALLEL: ${{ inputs.matrix_parallel || '5' }}
          CRAWLER_TELEMETRY_ENABLED: ${{ github.event_name != 'workflow_dispatch' || inputs.telemetry_enabled }}
          TELEMETRY_SAMPLE_INTERVAL_MS: ${{ inputs.telemetry_sample_interval_ms || '2000' }}
          CRAWLER_UNIVERSITY_GROUP: ${{ matrix.group }}
          CRAWLER_TELEMETRY_OUTPUT_DIR: exports/notices/${{ matrix.group }}
          CRAWL_RETRY_MAX_DELAY_MS: "30000"
          CRAWL_RETRY_JITTER_RATIO: "0.1"
          CRAWL_FRESH_START: ${{ inputs.fresh_start || 'false' }}
          CRAWL_IGNORE_SEEN: ${{ github.event.inputs.ignore_seen || 'false' }}
        run: |
          UNIVERSITY_JOB_STARTED_MS=$(date +%s%3N)
          echo "UNIVERSITY_JOB_STARTED_MS=${UNIVERSITY_JOB_STARTED_MS}" >> "$GITHUB_ENV"
          case "$GROUP" in
            ewha)
              export CRAWL_TIMEOUT_MS="30000" CRAWL_RETRY_COUNT="3" CRAWL_RETRY_BACKOFF_MS="1500" CRAWL_FORCE_IPV4="true"
              ;;
            cau)
              export CRAWL_TIMEOUT_MS="30000" CRAWL_RETRY_COUNT="2" CRAWL_RETRY_BACKOFF_MS="1200" CRAWL_ALLOW_INSECURE_TLS_HOSTS="econ.cau.ac.kr"
              ;;
            hanyang)
              export CRAWL_TIMEOUT_MS="30000" CRAWL_RETRY_COUNT="3" CRAWL_RETRY_BACKOFF_MS="1500" CRAWL_FORCE_IPV4="true" CRAWL_ALLOW_INSECURE_TLS_HOSTS="hyurban.hanyang.ac.kr"
              ;;
            uos)
              export CRAWL_TIMEOUT_MS="30000" CRAWL_RETRY_COUNT="2" CRAWL_RETRY_BACKOFF_MS="1200"
              ;;
          esac
          node scripts/crawl-scholarship-notices.mjs "db:${GROUP}" "exports/notices/${GROUP}" ".crawler/${GROUP}-daily-state.json"

      - name: Clean university crawl results
        env:
          GROUP: ${{ matrix.group }}
        run: |
          CLEANER_STARTED_MS=$(date +%s%3N)
          TODAY=$(TZ=Asia/Seoul date +%Y%m%d)
          INPUT="exports/notices/${GROUP}/scholarship-notices-new-${TODAY}.csv"
          if [ -f "$INPUT" ]; then
            node scripts/clean-crawled-notices.mjs \
              "$INPUT" \
              "exports/notices/${GROUP}/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/${GROUP}/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_${GROUP}_csv"
          fi
          echo "CLEANER_DURATION_MS=$(($(date +%s%3N)-CLEANER_STARTED_MS))" >> "$GITHUB_ENV"

      - name: Finalize university performance telemetry
        if: always()
        env:
          GROUP: ${{ matrix.group }}
        run: |
          if [ "${{ github.event_name != 'workflow_dispatch' || inputs.telemetry_enabled }}" != "true" ]; then
            echo "telemetry=disabled"
            exit 0
          fi
          JOB_DURATION_MS=$(($(date +%s%3N)-${UNIVERSITY_JOB_STARTED_MS:-$(date +%s%3N)}))
          node scripts/finalize-crawler-performance-telemetry.mjs \
            "exports/notices/${GROUP}" \
            "${CLEANER_DURATION_MS:-}" \
            "$JOB_DURATION_MS" || echo "::warning::performance telemetry finalization failed for ${GROUP}"

      - name: Save university crawler state
        if: ${{ always() && github.event.inputs.fresh_start != 'true' && github.event.inputs.ignore_seen != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .crawler/${{ matrix.group }}-daily-state.json
          key: crawler-daily-state-v3-${{ matrix.group }}-${{ github.run_id }}

      - name: Upload university crawl artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-result-${{ matrix.group }}
          path: |
            exports/notices/${{ matrix.group }}
            .crawler/${{ matrix.group }}-daily-state.json
          if-no-files-found: warn

  aggregate:
    name: Aggregate daily crawl
    needs: crawl-by-university
    if: always()
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Restore quality and source health history
        uses: actions/cache/restore@v4
        with:
          path: |
            exports/notices/quality
            exports/notices/*/scholarship-notices-????????.json
          key: crawler-quality-history-v1-${{ github.run_id }}
          restore-keys: |
            crawler-quality-history-v1-

      - name: Download university crawl artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: crawl-result-*
          merge-multiple: true
          path: .

      - name: Verify university crawl results
        run: |
          for GROUP in ewha cau korea khu hanyang hongik yonsei skku uos; do
            test -f "exports/notices/${GROUP}/scholarship-notices-latest.json" || {
              echo "::error::missing report for ${GROUP}"
              exit 1
            }
            test -f "exports/notices/${GROUP}/scholarship-notices-latest.cleaned.csv" || {
              echo "::error::missing cleaned CSV for ${GROUP}"
              exit 1
            }
          done

      - name: Build combined performance telemetry
        if: always()
        run: node scripts/build-crawler-performance-report.mjs exports/notices

      - name: Build combined daily CSV
        if: ${{ needs.crawl-by-university.result == 'success' }}
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y%m%d)
          MERGE_INPUT_PATHS="exports/notices/cau/scholarship-notices-latest.cleaned.csv,exports/notices/ewha/scholarship-notices-latest.cleaned.csv,exports/notices/hanyang/scholarship-notices-latest.cleaned.csv,exports/notices/hongik/scholarship-notices-latest.cleaned.csv,exports/notices/khu/scholarship-notices-latest.cleaned.csv,exports/notices/korea/scholarship-notices-latest.cleaned.csv,exports/notices/skku/scholarship-notices-latest.cleaned.csv,exports/notices/uos/scholarship-notices-latest.cleaned.csv,exports/notices/yonsei/scholarship-notices-latest.cleaned.csv" \
          MERGE_OUTPUT_PATH="exports/notices/daily/scholarship-notices-daily-${TODAY}.csv" \
          npm run merge:notices
          MERGE_INPUT_PATHS="exports/notices/cau/scholarship-notices-latest.cleaned.csv,exports/notices/ewha/scholarship-notices-latest.cleaned.csv,exports/notices/hanyang/scholarship-notices-latest.cleaned.csv,exports/notices/hongik/scholarship-notices-latest.cleaned.csv,exports/notices/khu/scholarship-notices-latest.cleaned.csv,exports/notices/korea/scholarship-notices-latest.cleaned.csv,exports/notices/skku/scholarship-notices-latest.cleaned.csv,exports/notices/uos/scholarship-notices-latest.cleaned.csv,exports/notices/yonsei/scholarship-notices-latest.cleaned.csv" \
          MERGE_OUTPUT_PATH="exports/notices/daily/scholarship-notices-daily-latest.csv" \
          npm run merge:notices

      - name: Evaluate crawl quality
        if: ${{ needs.crawl-by-university.result == 'success' }}
        env:
          QUALITY_LOOKBACK_DAYS: "7"
          QUALITY_DAILY_DROP_RATIO: "0.5"
          QUALITY_SUCCESS_DROP_ABS: "0.2"
          QUALITY_CORE_GROUPS: "cau,ewha,korea"
        run: npm run evaluate:notices

      - name: Evaluate source health
        if: ${{ needs.crawl-by-university.result == 'success' }}
        env:
          HEALTH_LOOKBACK_DAYS: "7"
          HEALTH_CONSECUTIVE_ERROR_THRESHOLD: "3"
        run: npm run evaluate:source-health

      - name: Warn on quality regressions
        if: ${{ needs.crawl-by-university.result == 'success' }}
        run: |
          node -e "const fs=require('fs');const p='exports/notices/quality/quality-snapshot-latest.json';if(!fs.existsSync(p)){process.exit(0);}const s=JSON.parse(fs.readFileSync(p,'utf8'));const w=s.warnings||[];console.log('quality_warnings='+w.length);for(const item of w){console.log('::warning::'+item);}"
          node -e "const fs=require('fs');const p='exports/notices/quality/source-health-latest.json';if(!fs.existsSync(p)){process.exit(0);}const s=JSON.parse(fs.readFileSync(p,'utf8'));const total=s.totalCandidates||0;console.log('source_health_candidates='+total);for(const group of (s.perGroup||[])){for(const c of (group.candidates||[]).slice(0,5)){console.log('::warning::source unhealthy group='+group.group+' source='+c.sourceId+' streak='+c.consecutiveErrorDays+' error='+c.lastError);}}"

      - name: Save quality and source health history
        if: ${{ needs.crawl-by-university.result == 'success' }}
        uses: actions/cache/save@v4
        with:
          path: |
            exports/notices/quality
            exports/notices/*/scholarship-notices-????????.json
          key: crawler-quality-history-v1-${{ github.run_id }}

      - name: Ingest notices into Supabase
        if: ${{ needs.crawl-by-university.result == 'success' }}
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y%m%d)
          npm run ingest:notices -- "exports/notices/daily/scholarship-notices-daily-${TODAY}.csv"

      - name: Summarize review feedback
        if: ${{ needs.crawl-by-university.result == 'success' }}
        env:
          FEEDBACK_LOOKBACK_DAYS: "14"
        run: npm run feedback:notices

      - name: Send Slack summary
        if: ${{ needs.crawl-by-university.result == 'success' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPORT_JSON_PATHS: exports/notices/cau/scholarship-notices-latest.json,exports/notices/ewha/scholarship-notices-latest.json,exports/notices/hanyang/scholarship-notices-latest.json,exports/notices/hongik/scholarship-notices-latest.json,exports/notices/khu/scholarship-notices-latest.json,exports/notices/korea/scholarship-notices-latest.json,exports/notices/skku/scholarship-notices-latest.json,exports/notices/uos/scholarship-notices-latest.json,exports/notices/yonsei/scholarship-notices-latest.json
          CLEANED_CSV_PATHS: exports/notices/cau/scholarship-notices-latest.cleaned.csv,exports/notices/ewha/scholarship-notices-latest.cleaned.csv,exports/notices/hanyang/scholarship-notices-latest.cleaned.csv,exports/notices/hongik/scholarship-notices-latest.cleaned.csv,exports/notices/khu/scholarship-notices-latest.cleaned.csv,exports/notices/korea/scholarship-notices-latest.cleaned.csv,exports/notices/skku/scholarship-notices-latest.cleaned.csv,exports/notices/uos/scholarship-notices-latest.cleaned.csv,exports/notices/yonsei/scholarship-notices-latest.cleaned.csv
          SOURCE_LABELS: 중앙대,이화여대,한양대,홍익대,경희대,고려대,성균관대,시립대,연세대
          SLACK_PREVIEW_COUNT: "5"
        run: npm run notify:slack

      - name: Record incomplete crawl matrix
        if: ${{ needs.crawl-by-university.result != 'success' }}
        run: |
          echo "crawl_matrix_result=${{ needs.crawl-by-university.result }}"
          echo "ingestion_skipped=incomplete_university_results"

      - name: Upload aggregate crawl artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scholarship-notice-daily
          path: |
            exports/notices
            .crawler
          if-no-files-found: warn
