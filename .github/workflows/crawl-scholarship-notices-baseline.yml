      - name: Clean SKKU baseline crawl
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/skku-baseline/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/skku-baseline/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/skku-baseline/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/skku-baseline/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_skku_baseline_csv"
          fi

      - name: Run UOS baseline crawl
        env:
          CRAWL_LOOKBACK_DAYS: "31"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
        run: node scripts/crawl-scholarship-notices.mjs db:uos exports/notices/uos-baseline .crawler/uos-baseline-state.json

      - name: Clean UOS baseline crawl
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/uos-baseline/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/uos-baseline/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/uos-baseline/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/uos-baseline/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_uos_baseline_csv"
          fi

      - name: Upload baseline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scholarship-notice-baseline
          path: |
            exports/notices/cau-baseline
            exports/notices/ewha-baseline
            exports/notices/hanyang-baseline
            exports/notices/hongik-baseline
            exports/notices/khu-baseline
            exports/notices/korea-baseline
            exports/notices/skku-baseline
            exports/notices/uos-baseline
            exports/notices/yonsei-baseline
            .crawler/cau-baseline-state.json
            .crawler/ewha-baseline-state.json
            .crawler/hanyang-baseline-state.json
            .crawler/hongik-baseline-state.json
            .crawler/khu-baseline-state.json
            .crawler/korea-baseline-state.json
            .crawler/skku-baseline-state.json
            .crawler/uos-baseline-state.json
            .crawler/yonsei-baseline-state.json
