name: Baseline Scholarship Notice Crawl

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    # 07:30 KST every Monday
    - cron: "30 22 * * 0"

jobs:
  baseline-crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply unified source tuning
        run: |
          npm run tune:ewha-notices
          npm run tune:korea-notices
          npm run tune:skku-notices
          npm run tune:yonsei-notices

      - name: Reset baseline state
        run: |
          mkdir -p .crawler
          rm -f .crawler/ewha-baseline-state.json .crawler/korea-baseline-state.json .crawler/skku-baseline-state.json .crawler/yonsei-baseline-state.json

      - name: Run Ewha baseline crawl
        env:
          CRAWL_LOOKBACK_DAYS: "31"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "4"
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources.csv exports/notices/ewha-baseline .crawler/ewha-baseline-state.json

      - name: Clean Ewha baseline crawl
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/ewha-baseline/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/ewha-baseline/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/ewha-baseline/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/ewha-baseline/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_ewha_baseline_csv"
          fi

      - name: Run Korea baseline crawl
        env:
          CRAWL_LOOKBACK_DAYS: "31"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources-korea.csv exports/notices/korea-baseline .crawler/korea-baseline-state.json

      - name: Clean Korea baseline crawl
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/korea-baseline/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/korea-baseline/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/korea-baseline/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/korea-baseline/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_korea_baseline_csv"
          fi

      - name: Run Yonsei baseline crawl
        env:
          CRAWL_LOOKBACK_DAYS: "31"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources-yonsei.csv exports/notices/yonsei-baseline .crawler/yonsei-baseline-state.json

      - name: Clean Yonsei baseline crawl
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/yonsei-baseline/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/yonsei-baseline/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/yonsei-baseline/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/yonsei-baseline/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_yonsei_baseline_csv"
          fi

      - name: Run SKKU baseline crawl
        env:
          CRAWL_LOOKBACK_DAYS: "31"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
        run: node scripts/crawl-scholarship-notices.mjs data/notice-sources-skku.csv exports/notices/skku-baseline .crawler/skku-baseline-state.json

      - name: Clean SKKU baseline crawl
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/skku-baseline/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/skku-baseline/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/skku-baseline/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/skku-baseline/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_skku_baseline_csv"
          fi

      - name: Upload baseline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scholarship-notice-baseline
          path: |
            exports/notices/ewha-baseline
            exports/notices/korea-baseline
            exports/notices/skku-baseline
            exports/notices/yonsei-baseline
            .crawler/ewha-baseline-state.json
            .crawler/korea-baseline-state.json
            .crawler/skku-baseline-state.json
            .crawler/yonsei-baseline-state.json
