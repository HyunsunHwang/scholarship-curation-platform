name: Baseline Scholarship Notice Crawl

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    # 07:30 KST every Monday
    - cron: "30 22 * * 0"

jobs:
  baseline-crawl:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Reset baseline state
        run: |
          mkdir -p .crawler
          rm -f .crawler/cau-baseline-state.json .crawler/ewha-baseline-state.json .crawler/hanyang-baseline-state.json .crawler/hongik-baseline-state.json .crawler/khu-baseline-state.json .crawler/korea-baseline-state.json .crawler/skku-baseline-state.json .crawler/uos-baseline-state.json .crawler/yonsei-baseline-state.json

      - name: Run CAU baseline crawl
        env:
          CRAWL_LOOKBACK_DAYS: "31"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
        run: node scripts/crawl-scholarship-notices.mjs db:cau exports/notices/cau-baseline .crawler/cau-baseline-state.json

      - name: Clean CAU baseline crawl
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/cau-baseline/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/cau-baseline/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/cau-baseline/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/cau-baseline/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_cau_baseline_csv"
          fi

      - name: Run Ewha baseline crawl
        env:
          CRAWL_LOOKBACK_DAYS: "31"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "1"
          CRAWL_TIMEOUT_MS: "30000"
          CRAWL_RETRY_COUNT: "3"
          CRAWL_RETRY_BACKOFF_MS: "1500"
          CRAWL_FORCE_IPV4: "true"
        run: node scripts/crawl-scholarship-notices.mjs db:ewha exports/notices/ewha-baseline .crawler/ewha-baseline-state.json

      - name: Clean Ewha baseline crawl
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/ewha-baseline/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/ewha-baseline/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/ewha-baseline/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/ewha-baseline/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_ewha_baseline_csv"
          fi

      - name: Run KHU baseline crawl
        env:
          CRAWL_LOOKBACK_DAYS: "31"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
        run: node scripts/crawl-scholarship-notices.mjs db:khu exports/notices/khu-baseline .crawler/khu-baseline-state.json

      - name: Clean KHU baseline crawl
        run: |
          TODAY=$(date +%Y%m%d)
          if [ -f "exports/notices/khu-baseline/scholarship-notices-new-${TODAY}.csv" ]; then
            node scripts/clean-crawled-notices.mjs \
              "exports/notices/khu-baseline/scholarship-notices-new-${TODAY}.csv" \
              "exports/notices/khu-baseline/scholarship-notices-latest.cleaned.csv" \
              "exports/notices/khu-baseline/scholarship-notices-latest.rejected.csv"
          else
            echo "skip=missing_khu_baseline_csv"
          fi

      - name: Run Hanyang baseline crawl
        env:
          CRAWL_LOOKBACK_DAYS: "31"
          CRAWL_ALLOW_UNDATED: "true"
          CRAWL_SOURCE_CONCURRENCY: "8"
        run: node scripts/crawl-scholarship-notices.mjs db:hanyang exports/notices/hanyang-baseline .crawler/hanyang-baseline-state.json

      - name: Clean Hanyang baseline crawl
